name: CI (Ledger Validation)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Ensure Test Runner is Executable
        run: chmod +x bin/run-tests
          
      - name: Execute Deterministic Validation (TDD)
        run: ./bin/run-tests
