config:
  gates:
    design_review: true
    execution_review: false
    reflection_review: true
nodes:
  node_20_probe_authorization_gate_collision:
    status: IN_REVIEW
    title: Probe Authorization Gate Collision
    goal: Investigate the Authorization Gate Collision where a full-auto Executioner
      clone running PLAN+EXECUTE autonomously bypasses the HTIL Design-Review Gate.
    type: PROBE
    dependencies:
    - node_19a_probe_pre_merge_sync
    - node_19b_probe_ledger_resolution
    - node_19c_probe_state_merging
  node_21_probe_reflect_boundary_collision:
    status: IN_REVIEW
    title: Probe Reflect Boundary Collision
    goal: Investigate the Reflect Boundary Collision. Determine invariants for how
      agents coordinate git states during reflect-green.
    type: PROBE
    dependencies:
    - node_19a_probe_pre_merge_sync
    - node_19b_probe_ledger_resolution
    - node_19c_probe_state_merging
  node_19a_probe_pre_merge_sync:
    title: Probe Pre-Merge Sync
    goal: Physically probe the mechanical behavior of concurrent git fetch and rebase
      locking in the Dyad substrate.
    type: PROBE
    status: IN_REVIEW
  node_19b_probe_ledger_resolution:
    title: Probe Ledger Resolution
    goal: Physically test deterministic chronology sorting and exact append behavior
      on ledger collisions.
    type: PROBE
    status: IN_REVIEW
  node_19c_probe_state_merging:
    title: Probe Structural State Merging
    goal: Physically test the last-write-wins dictionary resolution logic on concurrent
      YAML writes.
    type: PROBE
    status: IN_REVIEW
