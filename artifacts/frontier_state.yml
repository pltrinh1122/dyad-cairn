nodes:
  node_10_build_gap_reader:
    dependencies: []
    goal: Upgrade frontier_reader.py to dynamically derive node status from the physical
      substrate (branches, tests) rather than relying on cached strings, fulfilling
      the GAP invariant.
    title: Build GAP-Compliant Frontier Reader
    type: execute
  node_4b_execute_sonar_halting:
    dependencies: []
    goal: Implement the markdown parser in dip_sonar.py to dynamically extract the
      required dimensions, passing the TDD tests.
    title: Execute Provenance Extraction Invariant
    type: execute
  node_4c_probe_anchor_compilation:
    dependencies:
    - node_4a_execute_matrix_schema
    goal: Investigate how a fully saturated dip_state.yml is safely and deterministically
      projected into the immutable GEMINI.md anchor.
    title: Probe Anchor Compilation Invariant
    type: probe
  node_9_probe_css_presentation:
    dependencies: []
    goal: Investigate why the Agent consistently fails to explicitly present the CSS
      (Continue, Start, Stop) template in the chat UI during Dyad Retros, despite
      the mechanical UI presentation firing in the logs.
    title: Probe Missing CSS Presentation
    type: probe
  node_11_probe_todo_pipeline:
    dependencies: []
    goal: Architect and define the mechanical ingestion pipeline for the `todo:` dialect
      marker, investigating how a pre-DAG holding pen (e.g., `bin/todo`) should physically
      map to the substrate without polluting the SPAOR loop.
    title: Probe Todo Ingestion Pipeline
    type: probe
  node_12_bind_conversational_gates:
    type: PLAN
    status: IN_REVIEW
    title: Bind Conversational Dialect to Mechanical CSI Guards
    goal: Structurally bind 'bind:', 'lean.', and the Wu-Wei Closure Action by building
      their physical deterministic wrappers (bin/bind, bin/node inject/authorize,
      and reflect-green retro_msg enforcement).
