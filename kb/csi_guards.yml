# The CSI Guard Registry
# This file tracks all active mechanical traps and their specific closure keys.
# It explicitly defines whether a guard is Symmetric (State-Bound) or Asymmetric (Process-Bound).

guards:
  - id: topology_mass_monitor
    type: Symmetric
    description: "Monitors the file count (mass) of skills/, bin/, and kb/ to prevent monolithic degradation."
    armed_condition: "File count in a monitored directory exceeds its CAPACITY_LIMIT in tests/test_topology_monitor.py"
    disarmed_condition: "Directory is physically compressed (refactored), OR limit is raised following an Ontological Bond (Retro)."
    trigger_location: "tests/test_topology_monitor.py (CI Gate)"

  - id: retro_lock
    type: Asymmetric
    description: "Locks the SPAOR state machine to mandate cognitive reflection (CSS format) before resuming payload execution."
    armed_condition: "Execution of ./bin/retro-start (creates dyad-state/RETRO_ACTIVE.lock)"
    disarmed_condition: "Execution of ./bin/retro <summary> <path/to/retro.md> which validates the CSS format and syncs the ledger."
    trigger_location: "All orchestration wrappers (e.g., ./bin/node, ./bin/backlog)"

  - id: commons_drift
    type: Asymmetric
    description: "Traps the CI Gate if the commons/ library submodule diverges from upstream origin/main."
    armed_condition: "Upstream commits detected by tests/test_commons_sync.py"
    disarmed_condition: "Execution of ./bin/sync-commons <synthesis> which pulls the changes and physically anchors the cognitive ingestion to the Ledger."
    trigger_location: "tests/test_commons_sync.py (CI Gate)"

  - id: dependency_drift
    type: Asymmetric
    description: "Traps the CI Gate and local test harness if imports are missing from requirements.txt."
    armed_condition: "A Python import statement (non-stdlib) is not present in requirements.txt"
    disarmed_condition: "Adding the package to requirements.txt"
    trigger_location: "tests/test_dependency_guard.py (CI Gate)"

  - id: remote_gap_sync
    type: Asymmetric
    description: "Traps the SPAOR flow if the remote GitHub Actions Pipeline (GAP) diverges from the expected local state (Survivor Bias)."
    armed_condition: "A PR is created or updated, triggering a CI run."
    disarmed_condition: "Execution of GAP verification passing (or reflecting the correct intended failure) in CI."
    trigger_location: "skills/flow_state_manager.py (PR Reflection)"
